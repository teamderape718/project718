# Déploie sur ton VPS quand tu pousses sur la branche main.
# Configuration unique : voir .github/workflows/README-DEPLOY.md
name: Deploy to VPS

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            QC_ROOT=""
            for dir in /root/qcfa /var/www/q-cfa /var/www/qcfa; do
              if [ -d "$dir/.git" ]; then QC_ROOT="$dir"; break; fi
            done
            if [ -z "$QC_ROOT" ]; then echo "Aucun depot git trouve (/root/qcfa ou /var/www/q-cfa)"; exit 1; fi
            cd "$QC_ROOT"
            git pull origin main || git pull origin master
            npm install
            npm run db:migrate
            npm run web:build
            pm2 restart qcfa-api || pm2 start deploy/ecosystem.config.cjs --only qcfa-api
            pm2 restart qcfa-bot || true
