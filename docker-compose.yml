services:
  postgres:
    image: postgres:16-alpine
    container_name: qcfa-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: qcfa
      POSTGRES_PASSWORD: qcfa
      POSTGRES_DB: qcfa
    volumes:
      - qcfa_pgdata:/var/lib/postgresql/data

volumes:
  qcfa_pgdata:
